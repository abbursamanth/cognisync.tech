<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    body {
      background: #00091B;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    @keyframes fadeIn {
      from { top: 20%; opacity: 0; }
      to { top: 100%; opacity: 1; }
    }

    @-webkit-keyframes fadeIn {
      from { top: 20%; opacity: 0; }
      to { top: 100%; opacity: 1; }
    }

    .wrapper {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      -webkit-transform: translate(-50%, -50%);
      animation: fadeIn 1000ms ease;
      -webkit-animation: fadeIn 1000ms ease;
      text-align: center;
    }

    h1 {
      font-size: 50px;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 0;
      line-height: 1;
      font-weight: 700;
    }

    .dot {
      color: #4FEBFE;
    }

    p {
      margin: 18px 0;
      font-family: 'Muli', sans-serif;
      font-weight: normal;
    }

    .icons {
      margin-top: 20px;
    }

    .icons a {
      text-decoration: none;
    }

    .icons i {
      color: #00091B;
      background: #fff;
      height: 15px;
      width: 15px;
      padding: 13px;
      margin: 0 10px;
      border-radius: 50px;
      border: 2px solid #fff;
      transition: all 200ms ease;
      text-align: center;
    }

    .icons i:hover, .icons i:active {
      color: #fff;
      background: none;
      cursor: pointer !important;
      transform: scale(1.2);
      -webkit-transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Coming Soon<span class="dot">.</span></h1>
    <p>rewiring reality</p>
    <div class="icons">
      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/company/cognisync-tech/?viewAsMember=true" target="_blank">
        <i class="fa fa-linkedin"></i>
      </a>

      <!-- X (formerly Twitter) -->
      <a href="https://x.com/Cognisynctech" target="_blank">
        <i class="fa fa-twitter"></i>
      </a>

      <!-- Instagram -->
      <a href="https://www.instagram.com/cognisync.tech/" target="_blank">
        <i class="fa fa-instagram"></i>
      </a>

      <!-- YouTube -->
      <a href="https://www.youtube.com/@Cognisynctech" target="_blank">
        <i class="fa fa-youtube-play"></i>
      </a>
    </div>
  </div>
</body>
</html>
