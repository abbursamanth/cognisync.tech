<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <!-- ✅ Font Awesome 6 via CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #00091B;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .wrapper {
      animation: fadeIn 800ms ease-in-out;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
    }

    .dot {
      color: #4FEBFE;
    }

    p {
      margin: 18px 0;
      font-family: 'Muli', sans-serif;
      font-size: 1rem;
    }

    .icons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .icons a {
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #00091B;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 20px;
      border: 2px solid #fff;
      transition: all 0.3s ease;
    }

    .icons a:hover {
      background: transparent;
      color: #fff;
      transform: scale(1.15);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }

      .icons a {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <h1>Coming Soon<span class="dot">.</span></h1>
    <p>rewiring reality</p>

    <div class="icons">
      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/company/cognisync-tech/?viewAsMember=true" target="_blank" aria-label="LinkedIn">
        <i class="fab fa-linkedin"></i>
      </a>

      <!-- X (formerly Twitter) -->
      <a href="https://x.com/Cognisynctech" target="_blank" aria-label="X (Twitter)">
        <i class="fab fa-x"></i>
      </a>

      <!-- Instagram -->
      <a href="https://www.instagram.com/cognisync.tech/" target="_blank" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>

      <!-- YouTube -->
      <a href="https://www.youtube.com/@Cognisynctech" target="_blank" aria-label="YouTube">
        <i class="fab fa-youtube"></i>
      </a>
    </div>
  </div>
</body>

</html>
